services:
  postgres:
    image: postgres:16-alpine
    container_name: mymo-postgres
    environment:
      POSTGRES_DB: mymo
      POSTGRES_USER: mymo_user
      POSTGRES_PASSWORD: mymo_secure_password_change_in_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mymo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymo_user -d mymo"]
      interval: 10s
      timeout: 5s
      retries: 5

  mymo-ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: mymo-ocr
    ports:
      - "8000:8000"
    networks:
      - mymo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  mymo-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mymo-backend
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - OCR_SERVICE_URL=http://mymo-ocr:8000
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      mymo-ocr:
        condition: service_started
    networks:
      - mymo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  mymo-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.mymo.my.id/api
    container_name: mymo-web
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    depends_on:
      mymo-backend:
        condition: service_healthy
    networks:
      - mymo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mymo-cloudflare-tunnel
    command: tunnel --no-autoupdate run --token eyJhIjoiMWU1ZjE2ZDIyMDgxN2EzNmNlMDQwMjAyNGFlOWNlNDYiLCJ0IjoiYmI0MzdhOWItY2M4Ny00YWI1LTk2Y2QtMmYzYWM4NmRjYjYwIiwicyI6Ik9UVmtaVE5oWkRJdE1tSTFZaTAwTldKbExUaG1aR010TVRRMU1XUmpaR1ZrT1dNMyJ9
    depends_on:
      mymo-web:
        condition: service_healthy
    networks:
      - mymo-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  mymo-network:
    driver: bridge
