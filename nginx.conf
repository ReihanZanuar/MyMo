server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # Static HTML pages
    location = /login.html {
        try_files /login.html =404;
    }

    location = /signup.html {
        try_files /signup.html =404;
    }

    # Vue app entry point
    location = /index-vue.html {
        alias /usr/share/nginx/html/dist/index-vue.html;
    }

    # Vue app - serve built assets from dist folder
    location /assets/ {
        alias /usr/share/nginx/html/dist/assets/;
        try_files $uri =404;

        # Cache static assets with hash in filename
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Vue app - serve built assets from dist folder (legacy location block - keeping for reference)
    location /dist/ {
        alias /usr/share/nginx/html/dist/;
        try_files $uri =404;

        # Cache static assets with hash in filename
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Static CSS files
    location ~* \.(css)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Static JS files - no cache untuk mencegah stale scripts
    location ~* \.(js)$ {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Attachment folder (logo and other assets)
    location /Attachment/ {
        alias /usr/share/nginx/html/Attachment/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Handle attachment with lowercase (case-insensitive)
    location /attachment/ {
        alias /usr/share/nginx/html/Attachment/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Default fallback for Vue app SPA routing
    # This handles Vue Router paths like /dashboard, /transactions, etc.
    location / {
        try_files $uri $uri/ /dist/index.html;
    }
}
